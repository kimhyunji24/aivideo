spring:
  application:
    name: aivideo-studio
  data:
    redis:
      host: localhost
      port: 6379


aivideo:
  mock-mode: ${MOCK_MODE:false}
  mock-image-url: ${MOCK_IMAGE_URL:https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&q=80}
  mock-video-url: ${MOCK_VIDEO_URL:https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4}
  generated-files-path: ${user.home}/aivideo-generated

google:
  api-key: ${GOOGLE_API_KEY:}
  # Vertex AI 서비스 계정 JSON 파일 경로 (application-local.yml 또는 환경변수로 재정의)
  application-credentials: ${GOOGLE_APPLICATION_CREDENTIALS:}

gemini:
  text-model: ${GEMINI_TEXT_MODEL:gemini-2.5-flash}
  image-model: ${GEMINI_IMAGE_MODEL:gemini-2.5-flash-image}
  video-model: ${GEMINI_VIDEO_MODEL:veo-3.1}
  max-tokens: ${GEMINI_MAX_TOKENS:8192}
  temperature: ${GEMINI_TEMPERATURE:0.7}

# Vertex AI (Imagen 3) 설정
vertex:
  project-id: ${VERTEX_PROJECT_ID:project-1a126ade-f2d4-4793-a08}
  location: ${VERTEX_LOCATION:us-central1}

imagen:
  model: ${IMAGEN_MODEL:imagen-3.0-generate-002}
  output-dir: ${IMAGEN_OUTPUT_DIR:${user.home}/aivideo-generated/images}

veo:
  model: ${VEO_MODEL:veo-3.1-generate-preview}
  storage-uri: ${VEO_STORAGE_URI:gs://gongmojeon-veo3-model}
  duration-seconds: ${VEO_DURATION_SECONDS:8}
  poll-interval-ms: ${VEO_POLL_INTERVAL_MS:10000}
  poll-timeout-ms: ${VEO_POLL_TIMEOUT_MS:600000}
  output-dir: ${VEO_OUTPUT_DIR:${user.home}/aivideo-generated/videos}
