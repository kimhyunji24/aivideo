spring:
  application:
    name: aivideo-studio
  datasource:
    url: jdbc:h2:mem:aivideodb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

aivideo:
  mock-mode: false
  generated-files-path: ${user.home}/aivideo-generated

google:
  api-key: ${GOOGLE_API_KEY:}
